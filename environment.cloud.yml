# ============================================================================
# environment.cloud.yml -- FALLBACK ONLY
# ----------------------------------------------------------------------------
# Prefer the environment.yml exported from your validated WSL (Windows
# Subsystem for Linux) machine: it pins the exact versions your baseline
# results were produced with, which is what makes cloud results directly
# comparable to laptop results.
#
# Use THIS file only if that export fails to solve on the new machine
# (e.g. a pinned build hash no longer exists on conda-forge). It installs
# current versions of the same stack, unpinned. If you fall back to it,
# re-run the smoke test and re-check the reference case (pin-cell /
# assembly k_inf) against your validated baseline before trusting a full run.
#
#   mamba env create -n openmc-env -f environment.cloud.yml
# ============================================================================
name: openmc-env
channels:
  - conda-forge
dependencies:
  - python=3.11
  - openmc                # Open source Monte Carlo particle transport code
  - numpy
  - scipy
  - matplotlib
  - h5py
  - pandas
  - scikit-learn          # GP (Gaussian Process) + MLP (Multi-Layer Perceptron) surrogates
  - pymoo                 # NSGA-II (Non-Dominated Sorting Genetic Algorithm II)
  - pip
  - pip:
      - pyDOE2            # LHS (Latin Hypercube Sampling)
      - moocore           # hypervolume computation
      - cma
      - autograd
